<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Emrose Media Studios{% endblock %}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0f1a; --bg2: #111627; --bg3: #1a2038;
  --text: #eaedf3; --text2: #8892a8; --text3: #5a6478;
  --accent: #6366f1; --accent2: #818cf8; --accent-glow: rgba(99,102,241,0.15);
  --teal: #2dd4bf; --teal-glow: rgba(45,212,191,0.12);
  --danger: #f43f5e; --success: #10b981; --warning: #f59e0b;
  --card: #141929; --card-hover: #1a2038; --border: #1e2540; --border2: #2a3355;
  --input-bg: #0a0d18; --gradient: linear-gradient(135deg, #6366f1 0%, #2dd4bf 100%);
}
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
a { color: var(--accent2); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--teal); }

.container { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }

nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; gap: 24px; height: 60px; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
nav .logo { font-size: 1.15em; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px; }
nav .breadcrumb { color: var(--text3); font-size: 0.85em; }
nav .breadcrumb a { color: var(--text2); }
nav .breadcrumb a:hover { color: var(--accent2); }
nav .breadcrumb span { margin: 0 6px; color: var(--text3); }

.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 1.6em; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.page-header h2 { font-size: 1.3em; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
.page-header p { color: var(--text2); font-size: 0.9em; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.2s; font-family: inherit; }
.btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(99,102,241,0.3); }
.btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(99,102,241,0.4); transform: translateY(-1px); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--border2); border-color: var(--accent); }
.btn-teal { background: var(--teal); color: #0c0f1a; font-weight: 600; }
.btn-teal:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-sm { padding: 6px 14px; font-size: 0.82em; border-radius: 6px; }
.btn-lg { padding: 14px 28px; font-size: 1em; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; transition: all 0.25s; }
.card:hover { border-color: var(--border2); background: var(--card-hover); }
.card-highlight { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
.card-highlight:hover { border-color: var(--accent2); }
.card h3 { font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px; }
.card p { color: var(--text2); font-size: 0.9em; line-height: 1.6; }
.card .meta { font-size: 0.8em; color: var(--text3); margin-top: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

input[type="text"], textarea, select {
  background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
  padding: 11px 14px; border-radius: 8px; font-size: 0.9em; width: 100%;
  font-family: inherit; transition: border-color 0.2s;
}
input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text2); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

.badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; font-size: 0.75em; font-weight: 600; letter-spacing: 0.3px; }
.badge-accent { background: var(--accent-glow); color: var(--accent2); }
.badge-teal { background: var(--teal-glow); color: var(--teal); }
.badge-success { background: rgba(16,185,129,0.12); color: var(--success); }

.section-title { font-size: 0.95em; font-weight: 600; margin: 32px 0 16px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

.video-list { display: flex; flex-direction: column; gap: 10px; }
.video-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; transition: all 0.2s; }
.video-item:hover { border-color: var(--border2); }
.video-item .info { flex: 1; }
.video-item .info h4 { font-weight: 500; margin-bottom: 4px; font-size: 0.95em; }
.video-item .info .meta { font-size: 0.8em; color: var(--text3); }
.video-item .actions { display: flex; gap: 8px; align-items: center; }

.checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.88em; color: var(--text2); }
.checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }

.progress-log { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; font-family: 'SF Mono', 'Fira Code', Monaco, monospace; font-size: 0.82em; line-height: 2; max-height: 420px; overflow-y: auto; }
.progress-log .step { padding: 2px 0; border-bottom: 1px solid rgba(30,37,64,0.5); }
.progress-log .step:last-child { border-bottom: none; }
.progress-log .step.done { color: var(--success); }
.progress-log .step.error { color: var(--danger); }
.progress-log .step.active { color: var(--accent2); }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.video-player { width: 100%; max-width: 900px; margin: 20px auto; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.video-player video { width: 100%; display: block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 2.5em; margin-bottom: 12px; opacity: 0.5; }

.fade-in { animation: fadeIn 0.35s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.idea-card .field { margin-bottom: 16px; }
.idea-card .field-label { font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.idea-card .field-value { color: var(--text); line-height: 1.6; }
.idea-card .hook { color: var(--teal); font-style: italic; font-size: 1.05em; }

.flex { display: flex; } .flex-between { justify-content: space-between; } .flex-center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mt-32 { margin-top: 32px; } .mb-8 { margin-bottom: 8px; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">⬡ Emrose Media Studios</a>
  {% block breadcrumb %}{% endblock %}
</nav>
<div class="container fade-in">
  {% block content %}{% endblock %}
</div>
</body>
</html>
