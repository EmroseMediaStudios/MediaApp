<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Emrose Media Studio{% endblock %}</title>
<link rel="icon" type="image/png" href="/static/img/shield.png">
<link rel="apple-touch-icon" href="/static/img/shield.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Emrose Studio">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000000; --bg2: #000000; --bg3: #111111;
  --text: #e8dcc8; --text2: #a89878; --text3: #6b5d4a;
  --gold: #d4a854; --gold2: #c49a48; --gold-light: #e8c97a;
  --gold-glow: rgba(212,168,84,0.12); --gold-glow2: rgba(212,168,84,0.06);
  --rose: #c75050; --rose-dark: #8b3535;
  --card: #0a0a0a; --card-hover: #0e0e0e; --border: rgba(212,168,84,0.10); --border2: rgba(212,168,84,0.18);
  --input-bg: #050505; --success: #5a9e6f; --danger: #c75050;
}
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--gold-light); }

h1, h2, h3, h4 { font-family: 'Cinzel', 'Georgia', serif; color: var(--gold); letter-spacing: 0.5px; }

.container { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }

/* ---- NAV ---- */
nav { background: var(--bg2); border-bottom: 1px solid rgba(212,168,84,0.15); padding: 0 32px; display: flex; align-items: center; gap: 20px; height: 64px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
nav .logo { display: flex; align-items: center; gap: 12px; }
nav .logo img { height: 36px; width: auto; }
nav .logo-text { font-family: 'Cinzel', serif; font-size: 1.1em; font-weight: 600; color: var(--gold); letter-spacing: 1.5px; }
nav .logo-sub { font-family: 'Cinzel', serif; font-size: 0.65em; font-weight: 400; color: var(--text2); letter-spacing: 2px; display: block; margin-top: -2px; }
nav .breadcrumb { color: var(--text3); font-size: 0.85em; margin-left: auto; }
nav .breadcrumb a { color: var(--text2); }
nav .breadcrumb a:hover { color: var(--gold); }
nav .breadcrumb span { margin: 0 6px; color: var(--text3); }

/* ---- HEADER BANNER ---- */
.hero-banner { text-align: center; padding: 40px 20px 30px; margin-bottom: 10px; }
.hero-banner img { max-width: 500px; width: 100%; height: auto; }

/* ---- PAGE HEADER ---- */
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 1.5em; margin-bottom: 6px; }
.page-header h2 { font-size: 1.25em; margin-bottom: 6px; }
.page-header p { color: var(--text2); font-size: 0.9em; }

/* ---- BUTTONS ---- */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; font-size: 0.9em; font-weight: 500; transition: all 0.25s; font-family: inherit; letter-spacing: 0.3px; }
.btn-primary { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
.btn-primary:hover { background: var(--gold-light); border-color: var(--gold-light); box-shadow: 0 0 20px rgba(212,168,84,0.3); }
.btn-secondary { background: transparent; color: var(--gold); border: 1px solid var(--border2); }
.btn-secondary:hover { border-color: var(--gold); background: var(--gold-glow); }
.btn-sm { padding: 6px 14px; font-size: 0.82em; }
.btn-lg { padding: 14px 28px; font-size: 1em; font-family: 'Cinzel', serif; letter-spacing: 0.5px; }

/* ---- CARDS ---- */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 16px; transition: all 0.3s; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.card:hover { border-color: var(--border2); background: var(--card-hover); box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,84,0.08); }
.card-highlight { border-color: rgba(212,168,84,0.25); box-shadow: 0 0 24px var(--gold-glow), 0 2px 12px rgba(0,0,0,0.4); }
.card-highlight:hover { border-color: rgba(212,168,84,0.35); }
.card h3 { font-size: 1.05em; margin-bottom: 8px; }
.card p { color: var(--text2); font-size: 0.9em; line-height: 1.6; }
.card .meta { font-size: 0.8em; color: var(--text3); margin-top: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

/* ---- FORMS ---- */
input[type="text"], textarea, select {
  background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
  padding: 11px 14px; border-radius: 4px; font-size: 0.9em; width: 100%;
  font-family: inherit; transition: all 0.25s;
}
input:focus, textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-glow); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

.form-group { margin-bottom: 18px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text2); font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; font-family: 'Cinzel', serif; }

/* ---- GRID ---- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

/* ---- BADGES ---- */
.badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 3px; font-size: 0.75em; font-weight: 600; letter-spacing: 0.5px; }
.badge-gold { background: var(--gold-glow); color: var(--gold); border: 1px solid rgba(212,168,84,0.2); }
.badge-success { background: rgba(90,158,111,0.12); color: var(--success); }
.badge-rose { background: rgba(199,80,80,0.12); color: var(--rose); }

/* ---- SECTION TITLE ---- */
.section-title { font-family: 'Cinzel', serif; font-size: 0.85em; font-weight: 500; margin: 32px 0 16px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; }

/* ---- DIVIDER ---- */
.divider { border: none; border-top: 1px solid rgba(212,168,84,0.10); margin: 24px 0; position: relative; }
.divider::after { content: '◆'; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--bg); color: var(--text3); padding: 0 12px; font-size: 0.7em; }

/* ---- VIDEO LIST ---- */
.video-list { display: flex; flex-direction: column; gap: 10px; }
.video-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.video-item:hover { border-color: var(--border2); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.video-item .info { flex: 1; }
.video-item .info h4 { font-size: 0.95em; margin-bottom: 4px; }
.video-item .info .meta { font-size: 0.8em; color: var(--text3); }
.video-item .actions { display: flex; gap: 8px; align-items: center; }

/* ---- CHECKBOX ---- */
.checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.88em; color: var(--text2); }
.checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); }

/* ---- PROGRESS LOG ---- */
.progress-log { background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; font-family: 'SF Mono', 'Fira Code', Monaco, monospace; font-size: 0.82em; line-height: 2; max-height: 420px; overflow-y: auto; }
.progress-log .step { padding: 2px 0; border-bottom: 1px solid rgba(30,26,20,0.5); }
.progress-log .step:last-child { border-bottom: none; }
.progress-log .step.done { color: var(--success); }
.progress-log .step.error { color: var(--danger); }
.progress-log .step.active { color: var(--gold); }

/* ---- SPINNER ---- */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- VIDEO PLAYER ---- */
.video-player { width: 100%; max-width: 900px; margin: 20px auto; border-radius: 6px; overflow: hidden; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px var(--border); }
.video-player video { width: 100%; display: block; }

/* ---- EMPTY STATE ---- */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 2.5em; margin-bottom: 12px; opacity: 0.4; }

/* ---- IDEA CARD ---- */
.idea-card .field { margin-bottom: 16px; }
.idea-card .field-label { font-family: 'Cinzel', serif; font-size: 0.72em; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.idea-card .field-value { color: var(--text); line-height: 1.6; }
.idea-card .hook { color: var(--gold-light); font-style: italic; font-size: 1.05em; }

/* ---- ANIMATION ---- */
.fade-in { animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ---- UTILITIES ---- */
.flex { display: flex; } .flex-between { justify-content: space-between; } .flex-center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mt-32 { margin-top: 32px; } .mb-8 { margin-bottom: 8px; }
code { font-family: 'SF Mono', Monaco, monospace; background: var(--bg3); padding: 2px 6px; border-radius: 3px; font-size: 0.85em; color: var(--gold); }

/* ---- METRIC BOX (dashboard) ---- */
.metric-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 10px; text-align: center; transition: all 0.3s; }
.metric-box:hover { border-color: var(--border2); box-shadow: 0 0 16px rgba(212,168,84,0.06); }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <img src="/static/img/shield.png" alt="Emrose">
    <div>
      <span class="logo-text">EMROSE</span>
      <span class="logo-sub">MEDIA STUDIO</span>
    </div>
  </a>
  {% block breadcrumb %}{% endblock %}
</nav>
<div class="container fade-in">
  {% block content %}{% endblock %}
</div>
</body>
</html>
